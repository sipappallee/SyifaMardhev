<body class="bg-[#fafcff] text-slate-900">

    const Navbar = () => {

              </a>

          <button

              after:w-2/3 after:h-1.5 after:bg-gradient-to-r

        </h2>

    const Skills = () => {

        { title: "JavaScript", img: "img/jslogo.png" },
        { title: "PHP", img: "img/phplogo.png" },
        { title: "Laravel", img: "img/laravellogo.png" },
        { title: "React", img: "img/reactlogo.png" },

        { title: "Flutter", img: "img/flutterlogo.png" },

        "Communication",
        "Teamwork",
        "Problem Solving",
        "Responsibility",

          <div className="mb-10">
            <h3 className="text-xl font-semibold mb-4 text-blue-700">
              HARD SKILLS
            </h3>
            <div className="flex flex-wrap gap-3 bg-white p-6 rounded-3xl shadow-sm">

              if (p.more && !showAll) return null;
              return (

          <div className="text-center mt-8">
            <button onClick={() => setShowAll(!showAll)} className="px-6 py-3 bg-blue-500 text-white rounded-3xl font-semibold shadow-md hover:bg-blue-600 transition">{showAll ? "Hide Projects" : "View All Projects"}</button>

      const [selectedImg, setSelectedImg] = useState(null);
      const certs = [
        { title: "Belajar Dasar Pemrograman Web", program: "Dicoding", img: "img/web.png" },

        { title: "Belajar Dasar Pemrograman Javascript", program: "Dicoding", img: "img/webjavascript.png" },

        { title: "Introduction to Financial Literacy", program: "Dicoding", img: "img/financial.png", more: true },
        { title: "WordPress Intoduction", program: "MySkill", img: "img/wordpress.png", more: true },

        { title: "UX Writing Intorduction", program: "MySkill", img: "img/Ux.png", more: true },
        { title: "IGDX Career Seminar", program: "IGDX", img: "img/igdx.png", more: true },
        { title: "Konsep Pemrograman Micro Skill Digital Talent Scholarship 2025", program: "KOMDIGI", img: "img/micro.png", more: true },
        { title: "Keselamatan dan Kesehatan Kerja", program: "ILO", img: "img/k3.png", more: true },
        { title: "Belajar Dasar-Dasar HTML dan CSS", program: "CODE POLITAN", img: "img/htmlcss.png", more: true },

      return (
        <section id="certificate" className="max-w-6xl mx-auto px-6 py-20">

          <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-8">
            {certs.map((c, i) => {
              if (c.more && !showAll) return null;
              return (
                <div key={i} className="bg-white p-4 rounded-3xl shadow-sm hover:shadow-lg transition">
                  <img
                    src={c.img}
                    onClick={() => setSelectedImg(c.img)}
                    className="w-full h-40 object-contain bg-white rounded-2xl mb-4 cursor-pointer"
                    alt={c.title}
                  />
                  <h3 className="font-semibold">{c.title}</h3>
                  <p className="text-blue-500 text-sm mt-1">{c.program}</p>
                </div>
              )
            })}
            {selectedImg && (
              <div
                className="fixed inset-0 bg-black/70 flex items-center justify-center z-50"
                onClick={() => setSelectedImg(null)}

                <img
                  src={selectedImg}
                  className="max-w-[90%] max-h-[90%] rounded-xl shadow-lg"
                />
              </div>
            )}
          </div>
          <div className="text-center mt-8">
            <button onClick={() => setShowAll(!showAll)} className="px-6 py-3 bg-blue-500 text-white rounded-3xl font-semibold shadow-md hover:bg-blue-600 transition">{showAll ? "Tutup Sertifikat" : "Lihat Semua Sertifikat"}</button>
          </div>
        </section>
      );

    const Contact = () => {
      const contacts = [
        { icon: "fas fa-envelope", title: "Email", info: "syifa11409@gmail.com", link: "mailto:syifa11409@gmail.com" },
        { icon: "fab fa-instagram", title: "Instagram", info: "@syifamardh", link: "https://www.instagram.com/syifamardh/" },
        { icon: "fab fa-github-alt", title: "GitHub", info: "sipappallee", link: "https://github.com/sipappallee" },
        { icon: "fab fa-linkedin-in", title: "LinkedIn", info: "Syifa Mardhiyahtus", link: "https://www.linkedin.com/in/syifa-mardhiyahtus-soleha-a152b335a/" },
      ];
      return (
        <section id="contact" className="max-w-6xl mx-auto px-6 py-20">
          <h2 className="text-center text-3xl font-bold mb-10"> CONTACT</h2>
          <div className="flex flex-wrap justify-center gap-6">
            {contacts.map((c, i) => (
              <a
                key={i}
                href={c.link}
                target="_blank"
                className="bg-white p-6 rounded-3xl shadow-md hover:shadow-lg transition min-w-[180px] text-center flex flex-col items-center justify-center"

                <div className="w-16 h-16 bg-blue-50 text-blue-500 text-2xl flex items-center justify-center rounded-full mb-4">

      { icon: "fab fa-linkedin-in", link: "https://www.linkedin.com/in/syifa-mardhiyahtus-soleha-a152b335a/" },

    const Footer = () => (

        <div className="max-w-6xl mx-auto px-6 flex flex-col gap-6">

          <div className="flex justify-between items-center border-b border-white/10 pb-6 flex-wrap gap-4">

            <div className="flex gap-4">
              {socialLinks.map((item, i) => (
                <a

                  href={item.link}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="w-11 h-11 bg-white/10 rounded-full flex items-center justify-center text-gray-300 hover:bg-blue-500 hover:text-white transition"
                >
                  <i className={item.icon}></i>
                </a>
              ))}
            </div>
          </div>

          <div className="flex justify-center gap-6 flex-wrap">
            {["about", "education", "skills", "projects", "certificate", "contact"].map((sec, i) => (
              <a key={i} href={`#${sec}`} className="text-gray-400 hover:text-blue-400 transition">

            ))}

    const App = () => (
      <>

        <Hero />
        <About />
        <Education />
        <Skills />
        <Projects />
        <Certificate />
        <Contact />
        <Footer />

    );

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
